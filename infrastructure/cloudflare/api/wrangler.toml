name = "eustress-api"
main = "src/index.js"
compatibility_date = "2026-04-01"

# Route: api.eustress.dev/*
# Set this up in Cloudflare Dashboard after first deploy:
#   Workers Routes → Add Route → api.eustress.dev/* → eustress-api

# KV namespaces
[[kv_namespaces]]
binding = "USERS"
id = "58a7c318344d41fa8cfce36bc18ae763"

[[kv_namespaces]]
binding = "CHALLENGES"
id = "be98270d8e594722bed1508f11176fab"

[[kv_namespaces]]
binding = "KYC_STATUS"
id = "2a5efced14784736a8a1cc5368e72395"

[[kv_namespaces]]
binding = "SOCIAL"
id = "0e94f37a45eb49fea4defc9ba38dc46b"

[[kv_namespaces]]
binding = "INVENTORY"
id = "4ba9409d9b4d4175a6dcecabd697ac99"

[[kv_namespaces]]
binding = "SCREENING"
id = "3fc01ee7305c4c4ca5be6b14b74d6d53"

[[kv_namespaces]]
binding = "AUDIT_LOG"
id = "276638d8157344589cd2a82d4f1865bb"

[[kv_namespaces]]
binding = "PAYOUTS"
id = "c1d7016c782641aeba8662e2fa08b28b"

[[kv_namespaces]]
binding = "WORKSHOP_CONTEXT"
id = "44abf849a950492c8699a3fd3b7e3c27"

# R2 bucket for KYC documents (global, jurisdiction prefix in object key)
[[r2_buckets]]
binding = "KYC_BUCKET"
bucket_name = "eustress-kyc-documents"

# Secrets (set via wrangler secret put):
# JWT_SECRET            — persistent JWT signing key
# GROK_API_KEY          — xAI Grok API key for AI-enhanced search
# STRIPE_SECRET_KEY     — Stripe secret key for payments + Connect
# STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret

# Daily payout cron — runs at UTC midnight
[triggers]
crons = ["0 0 * * *"]

[vars]
FORK_ID = "eustress.dev"
