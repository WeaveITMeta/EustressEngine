<?xml version="1.0" encoding="UTF-8"?>
<!--
  Extension icon — matches the in-engine SoulScript glyph: a white diamond
  on a transparent background. 128-unit viewBox so Open VSX rasterises
  cleanly at any marketplace display size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <polygon points="64,16 112,64 64,112 16,64"
           fill="#FFFFFF"
           stroke="#C0C0C0"
           stroke-width="4"
           stroke-linejoin="round"/>
</svg>
