name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# NOTE (2026-06-09): this workflow previously targeted `eustress_demo/` and
# `eustress-svelte/`, which no longer exist in the repository. Every job that
# referenced them died at its first step — either "No such file or directory"
# for the working directory, or setup-node's pnpm cache lookup (no
# pnpm-lock.yaml is committed anywhere in the repo). The Rust workspace lives
# in `eustress/`, and the current web app is the Leptos crate at
# `eustress/crates/web` (Trunk-based, no pnpm). The stale rust-wasm-demo,
# web-build, and e2e jobs were removed; CI for the new web crate can be added
# once its build setup stabilises.

jobs:
  security:
    name: Security (cargo-deny & cargo-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Cargo workspace root. The repo root has no Cargo.toml, so all
        # cargo commands must run inside eustress/.
        working-directory: eustress
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        # Plain stable matches eustress/rust-toolchain.toml
        # (channel = "stable"), so rustup does not have to download a second
        # toolchain on the first cargo invocation inside eustress/.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tools-${{ hashFiles('eustress/Cargo.toml') }}

      - name: Generate lockfile
        # eustress/Cargo.lock is not committed; resolve a fresh lockfile for
        # the advisory scan.
        run: cargo generate-lockfile

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: cargo-deny (advisories, bans, sources)
        # deny.toml lives at the repo root, one level above the workspace.
        # NOTE: cargo-audit was removed from this job — it scans the same
        # RustSec DB as `cargo deny check advisories` but reads no config,
        # so it cannot honour the no-reachable-fix ignores documented in
        # deny.toml and would hard-fail on them forever.
        run: cargo deny check --config ../deny.toml advisories bans sources

  shader-validate:
    name: WGSL Validation (naga)
    runs-on: ubuntu-latest
    # No job-level `if` here. `hashFiles()` is NOT available in the
    # `jobs.<id>.if` context (it needs the checked-out workspace, which
    # doesn't exist when the job condition is evaluated), so the previous
    # `if: ${{ hashFiles('**/*.wgsl') != '' }}` was an invalid expression.
    # The "Validate WGSL" step below already exits 0 cleanly when there
    # are no .wgsl files, so the "skip when no shaders" behaviour is
    # handled there instead.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install naga-cli
        run: cargo install naga-cli || true

      - name: Validate WGSL
        shell: bash
        run: |
          shopt -s globstar nullglob
          # Only validate the engine's own shaders. The vendored wgpu tree
          # under eustress/.patches contains naga's own test corpus
          # (including intentionally-invalid shaders) and must never be
          # validated here.
          files=(eustress/crates/**/*.wgsl)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No WGSL files found. Skipping."
            exit 0
          fi
          which naga || { echo "naga CLI not found"; exit 1; }
          validated=0
          skipped=0
          for f in "${files[@]}"; do
            # Bevy shaders are preprocessed by naga_oil at load time
            # (#import / #ifdef / #{...} substitutions) and are not valid
            # standalone WGSL — bare naga cannot parse them. Only validate
            # self-contained WGSL files.
            if grep -qE '^[[:space:]]*#(import|ifdef|ifndef|else|endif|define|if[[:space:]])|#\{' "$f"; then
              echo "Skipping (naga_oil preprocessor directives): $f"
              skipped=$((skipped + 1))
              continue
            fi
            echo "Validating: $f"
            # naga-cli takes the input file as a positional argument; there
            # is no `parse` subcommand (the old `naga parse "$f"` invocation
            # made naga try to open a file literally named "parse").
            naga "$f"
            validated=$((validated + 1))
          done
          echo "WGSL validation done: $validated validated, $skipped skipped (naga_oil)."

  data-graph-purity:
    name: Columnar leaf stays out of the default engine graph
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Cargo workspace root (repo root has no Cargo.toml).
        working-directory: eustress
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Assert eustress-data / arrow / parquet / polars are absent from the default engine graph
        shell: bash
        run: |
          # DATA_PLATFORM_PLAN.md invariant D2: the columnar leaf and its
          # arrow / parquet / polars deps must NEVER enter the default
          # `cargo run` graph for the engine — they are pulled only by the
          # off-by-default `data` feature. `cargo tree` is metadata-only
          # (no compile), so this guard is cheap.
          #
          # `-e normal,build` excludes dev-dependencies (the `cargo run` graph,
          # not the test graph). Default engine features (`default = ["core"]`)
          # are used since no feature flags are passed.
          tree="$(cargo tree -p eustress-engine -e normal,build)"
          if printf '%s\n' "$tree" | grep -Eiq ' (eustress-data|arrow|arrow-[a-z]+|parquet|polars|polars-[a-z]+) v[0-9]'; then
            echo "::error::Columnar leaf leaked into the default eustress-engine graph (DATA_PLATFORM_PLAN.md D2). Offending entries:"
            printf '%s\n' "$tree" | grep -Ei ' (eustress-data|arrow|arrow-[a-z]+|parquet|polars|polars-[a-z]+) v[0-9]' || true
            exit 1
          fi
          echo "OK: default engine graph is free of eustress-data / arrow / parquet / polars."

      - name: Sanity-check that the data feature DOES pull the leaf
        shell: bash
        run: |
          # Positive control: with `--features data`, the leaf must appear —
          # otherwise the guard above could pass trivially from a typo.
          tree="$(cargo tree -p eustress-engine -e normal,build --features data)"
          if ! printf '%s\n' "$tree" | grep -Eiq ' eustress-data v[0-9]'; then
            echo "::error::--features data did not pull eustress-data; the feature wiring is broken."
            exit 1
          fi
          echo "OK: --features data pulls eustress-data as expected."
