name: Linux Engine Check

# Manually triggerable + runs on the ci/linux-build branch so we can
# iterate on Linux-only compile errors (e.g. wayland-backend) without
# tagging a release or touching main.
on:
  workflow_dispatch:
  push:
    branches: [ ci/linux-build ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check-linux:
    name: cargo check (eustress-engine, linux x64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev \
            libvulkan-dev libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libssl-dev pkg-config mold clang

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            eustress/target
          key: linux-engine-check-${{ hashFiles('eustress/Cargo.lock') }}

      - name: cargo check (engine)
        working-directory: eustress
        run: cargo check --package eustress-engine
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
