# cargo-deny configuration (schema v2)
#
# Updated 2026-06-09: the original file used the pre-0.14.21 schema
# (`vulnerability`, `notice`, string-valued `unmaintained`), which current
# cargo-deny rejects at config-parse time. Intent preserved: hard-fail on
# real vulnerabilities, keep everything else informational while the
# dependency tree is this large.

[advisories]
# The v2 default denies unmaintained-crate advisories; a Bevy-scale tree
# always carries a few and they should not gate CI. Actual vulnerabilities
# still hard-fail (v2 default).
unmaintained = "none"
yanked = "warn"
# Advisories with NO reachable fix from this dependency tree (verified
# 2026-06-09 against a freshly resolved lockfile: the fixed versions are on
# incompatible semver lines our direct deps cannot reach, or no fix exists).
# Each entry should be re-checked when its parent dependency line is bumped.
ignore = [
    # rsa "Marvin Attack" timing sidechannel — NO fixed release exists
    # (rsa caps at 0.9.x); pulled via sqlx-mysql <- sqlx 0.8 <- eustress-backend.
    "RUSTSEC-2023-0071",
    # protobuf 2.x uncontrolled recursion — fix only in 3.7.2; pulled via
    # prometheus 0.13 <- eustress-server.
    "RUSTSEC-2024-0437",
    # lz4_flex 0.7 — fix only in 0.11.6+; pulled via vtkio 0.6.3 (newest)
    # <- truck-meshalgo (CAD kernel).
    "RUSTSEC-2026-0041",
    # rustls-webpki 0.101/0.102 — fixes only on 0.103.x; 0.101 via
    # rustls 0.21 <- tokio-rustls/hyper-rustls 0.24 <- aws-sdk-s3;
    # 0.102 via rustls 0.22 <- sentry 0.34 and rumqttc 0.24.
    "RUSTSEC-2026-0049",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # glib 0.18 unsound iterator — fix in 0.20 (whole gtk3 binding line);
    # gtk3 is a transitive windowing/dialog dep, upgrade tracked upstream.
    "RUSTSEC-2024-0429",
    # lru 0.12 unsound IterMut — fix in 0.16.3; direct dep in
    # eustress-common (bump candidate) + aws-sdk-s3 transitive.
    "RUSTSEC-2026-0002",
    # rand 0.7 unsound fill on small slices — no 0.7 fix; via
    # phf_generator 0.8 <- phf_codegen 0.8 (build-time codegen only).
    "RUSTSEC-2026-0097",
]

[bans]
multiple-versions = "warn"
# Workspace crates depend on each other via `path` with no version, which
# cargo-deny counts as wildcard requirements; keep as a warning so internal
# path deps don't fail the job.
wildcards = "warn"
allow = []
deny = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
