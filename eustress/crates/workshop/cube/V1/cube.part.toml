# cube.part.toml — Voltec Cube part definition
#
# This is a .part.toml file. It describes a physical hardware part that can be
# attached to any registered tool. The mesh_path points to the .glb file
# generated by running the Blender script at:
#   cube/V1/meshes/scripts/generate_cube.py
#
# Generate the mesh:
#   blender --background --python cube/V1/meshes/scripts/generate_cube.py -- \
#           --output cube/V1/meshes/cube.glb
#
# PRIMARY indoor positioning: BLE advertisement → workshop gateways → RSSI/AoA triangulation.
# Gateways at known positions resolve the tool's indoor coordinates (±0.3–1m AoA, ±2–5m RSSI).
# This is what tells the system which bench, drawer, or shelf the tool is in.
#
# OUTDOOR FALLBACK: GPS + LTE-M fires ONLY on ARRIVAL events after 500ms of rest.
# GPS requires open sky and is useless indoors. It fires only when the tool has
# left the workshop (jobsite, van, transit) and no gateways are present.
# Every GPS fix records the tool's verified outdoor resting position.
#
# BLE fires on every event (departure + arrival), always within energy budget.
# KineticEnergyState is injected at entity spawn time by WorkshopTwinPlugin.

[part]
id            = "voltec-cube-v1"
name          = "Voltec Cube"
description   = "Batteryless kinetic dual-mode tracker — 18×18×8mm, BLE every event + GPS/LTE-M on arrival at rest, indefinite lifetime"
version       = "0.1.0-prototype"
manufacturer  = "Voltec / WeaveITMeta"
category      = "iot_tracking_module"

# Path to the generated mesh. Run generate_cube.py to produce this file.
# Relative to the workspace root.
mesh_path     = "eustress/crates/workshop/cube/V1/meshes/cube.glb"
mesh_generated = false  # set to true after generate_cube.py has been run

# Root transform — scale converts mm (Blender) to metres (Bevy)
[instance.transform]
translation = [0.0, 0.0, 0.0]
rotation    = [0.0, 0.0, 0.0, 1.0]
scale       = [0.001, 0.001, 0.001]

# ── Component initial states ──────────────────────────────────────────────────

[instance.components.kinetic_energy]
phase                = "uninitialized"
harvested_uj         = 0.0
bank_mv              = 0.0        # 10 mF ceramic supercap bank voltage (mV)
bank_capacity_mf     = 10.0      # 10 × 1 mF ceramics in parallel
bank_max_mv          = 3300.0
ble_fire_threshold_mv = 3000.0   # BLE fires at this voltage (~45 μJ stored)
gps_fire_threshold_mv = 2650.0   # GPS fires at this voltage (~35 mJ stored) — ARRIVAL ONLY
active               = false
ble_active           = false
gps_active           = false
rest_confirmed       = false     # true when tool has been still for gps_wait_for_rest_ms
rest_elapsed_ms      = 0.0       # ms of continuous stillness since last motion
gps_wait_for_rest_ms = 500.0    # firmware waits this long after motion stops before GPS fires
active_elapsed_ms    = 0.0
ble_window_ms        = 200.0     # BLE active window
gps_window_ms        = 2000.0    # GPS + LTE-M active window (fires after rest confirmed)
event_seq            = 0
total_events         = 0
gps_events           = 0
temp_c               = 22.0

[instance.components.electronic_state]
chip_id          = ""            # filled at registration time
firmware_version = "0.1.0"
rssi_dbm         = -80
temp_c           = 22.0
active           = false
kinetic_powered  = true
chip_model       = "nRF9161-SICA" # single SiP: BLE 5.3 + LTE-M + GNSS
has_gps          = true
has_lte_m        = true
has_ble          = true

[instance.components.thermal_state]
housing_temp_c           = 22.0
pcb_temp_c               = 22.0
magnet_temp_c            = 22.0
ambient_temp_c           = 22.0
active_power_mw          = 0.0
thermal_resistance_k_w   = 15.0

# ── Material slots ────────────────────────────────────────────────────────────

