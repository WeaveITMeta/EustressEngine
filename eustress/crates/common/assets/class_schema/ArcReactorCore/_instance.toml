# ARC-1 Arc Reactor Core — class schema
#
# Drop one of these into any Space folder to spawn a compact fission reactor.
# The FissionPlugin hydrates the entity with all nuclear ECS components
# automatically once the class_name is parsed.
#
# Physical parameters mirror the ARC-1 dashboard simulation:
#   • U-235/Pu-239 fuel     • 3.2 kW_th rated power
#   • One-group point kinetics with Doppler feedback
#   • TE + Stirling power conversion
#   • V-Cell battery buffer with peak-burst capability
#   • Three-loop PID controller for autonomous stability

[metadata]
class_name = "ArcReactorCore"
archivable = true

[transform]
position = [0.0, 1.0, 0.0]
rotation = [0.0, 0.0, 0.0, 1.0]
scale    = [1.0, 1.0, 1.0]

[properties]
color          = [41, 182, 246]   # Cyan — arc reactor blue
transparency   = 0.0
anchored       = true
can_collide    = true
cast_shadow    = true
reflectance    = 0.4
material       = "SmoothPlastic"
locked         = false

# ── Nuclear parameters (all optional — defaults to nominal ARC-1 conditions) ──
[nuclear]
neutron_population    = 1.0     # normalised; 1.0 = steady-state critical
core_temp_celsius     = 847.0   # °C
coolant_flow_pct      = 70.0    # %  (10–100)
battery_soc_pct       = 82.0    # %
load_demand_watts     = 280.0   # W
rod_bank_a_pct        = 50.0    # % insertion (0=withdrawn, 100=inserted)
rod_bank_b_pct        = 50.0    # % insertion
te_efficiency         = 0.14    # thermoelectric fraction
stirling_efficiency   = 0.28    # Stirling fraction
ai_regulation_enabled = true    # enable three-loop PID controller on spawn
