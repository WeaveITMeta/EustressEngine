<!-- CSG Intersect — lens-shaped overlap of two circles, filled.
     Lucide-style, 24x24, currentColor. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Overlap lens: two arcs forming a vesica piscis, filled. -->
  <path
    d="M 12 6 A 6 6 0 0 1 12 18 A 6 6 0 0 1 12 6 Z"
    fill="currentColor" fill-opacity="0.28" stroke="none"/>
  <!-- Outlines so the two source circles are readable -->
  <circle cx="9" cy="12" r="6"/>
  <circle cx="15" cy="12" r="6"/>
</svg>
