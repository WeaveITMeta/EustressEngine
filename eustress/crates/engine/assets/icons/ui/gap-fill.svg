<!-- Gap Fill — two blocks with a highlighted bridging segment between them.
     Lucide-style, 24x24, currentColor stroke. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left block -->
  <rect x="2" y="7" width="7" height="10" rx="1"/>
  <!-- Right block -->
  <rect x="15" y="7" width="7" height="10" rx="1"/>
  <!-- Bridging fill (dashed to suggest "just added") -->
  <line x1="9" y1="12" x2="15" y2="12" stroke-dasharray="1.5 1.5"/>
  <path d="M9 9 L15 9 L15 15 L9 15 Z" fill="currentColor" fill-opacity="0.18" stroke-width="0"/>
</svg>
