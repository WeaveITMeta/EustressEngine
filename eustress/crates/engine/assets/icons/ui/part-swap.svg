<!-- Part Swap — two parts exchanging positions via curved arrows.
     Lucide-style, 24x24, currentColor. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left block -->
  <rect x="2" y="4" width="7" height="7" rx="1"/>
  <!-- Right block (offset down) -->
  <rect x="15" y="13" width="7" height="7" rx="1"/>
  <!-- Top arrow: left block → right block's original position -->
  <path d="M9 7 C 14 7 14 4 18 4"/>
  <path d="M16 2 L18 4 L16 6"/>
  <!-- Bottom arrow: right block → left block's original position -->
  <path d="M15 17 C 10 17 10 20 6 20"/>
  <path d="M8 22 L6 20 L8 18"/>
</svg>
