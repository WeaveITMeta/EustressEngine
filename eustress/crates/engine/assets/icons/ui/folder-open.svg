<!-- Folder Open — an open folder with the front flap raised, Lucide-style.
     Used by the Explorer right-click "Ungroup" action. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Folder back + tab -->
  <path d="M3 6 a2 2 0 0 1 2 -2 h4 l2 2 h8 a2 2 0 0 1 2 2 v2"/>
  <!-- Open front flap (angled parallelogram suggesting depth) -->
  <path d="M3 10 h18 l-2 9 a1 1 0 0 1 -1 1 h-14 a1 1 0 0 1 -1 -1 z"/>
</svg>
