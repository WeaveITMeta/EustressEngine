<!-- Material Flip cursor badge — paint roller over a gradient surface. -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
  <!-- Base surface square -->
  <rect x="2" y="3" width="12" height="10" rx="1"/>
  <!-- Diagonal flip indicator -->
  <line x1="2" y1="13" x2="14" y2="3"/>
  <!-- Corner arrowhead suggesting rotation -->
  <path d="M11 3 L14 3 L14 6"/>
</svg>
