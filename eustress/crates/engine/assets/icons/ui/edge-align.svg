<!-- Edge Align — two parts with edges coincident on a shared line.
     Lucide-style, 24x24, currentColor. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left source block -->
  <rect x="3" y="5" width="8" height="6" rx="1"/>
  <!-- Bottom target block, flush on the same right-edge column as source -->
  <rect x="3" y="13" width="8" height="6" rx="1"/>
  <!-- Shared alignment edge — dotted vertical line through both right edges -->
  <line x1="11" y1="3" x2="11" y2="21" stroke-dasharray="1.5 2" opacity="0.9"/>
  <!-- Accent: small arrow suggesting snap -->
  <path d="M14 12 L17 12"/>
  <path d="M16 10 L17 12 L16 14"/>
</svg>
