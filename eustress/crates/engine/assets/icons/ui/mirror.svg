<!-- Mirror — a triangle shape reflected across a vertical dashed line.
     Lucide-style, 24x24, currentColor. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Mirror axis (vertical, dashed) -->
  <line x1="12" y1="3" x2="12" y2="21" stroke-dasharray="2 2"/>
  <!-- Source triangle (left half) — solid -->
  <path d="M3 5 L11 5 L11 19 Z"/>
  <!-- Mirrored triangle (right half) — solid -->
  <path d="M21 5 L13 5 L13 19 Z"/>
</svg>
