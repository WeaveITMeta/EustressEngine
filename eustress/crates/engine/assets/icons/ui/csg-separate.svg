<!-- CSG Separate — two distinct circles pulled apart with a gap between.
     Lucide-style, 24x24, currentColor. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left piece -->
  <circle cx="6" cy="12" r="4.5"/>
  <!-- Right piece -->
  <circle cx="18" cy="12" r="4.5"/>
  <!-- Center gap marker — short dashes suggesting separation line -->
  <line x1="11" y1="12" x2="13" y2="12" stroke-dasharray="1 1"/>
</svg>
