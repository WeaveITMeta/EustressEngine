<!-- Edge Align cursor badge — two stacked boxes on a vertical line. -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
  <!-- Alignment line -->
  <line x1="9" y1="2" x2="9" y2="14"/>
  <!-- Top box -->
  <rect x="2" y="3" width="7" height="4"/>
  <!-- Bottom box -->
  <rect x="2" y="9" width="7" height="4"/>
</svg>
