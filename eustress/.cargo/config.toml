[build]
# Enable incremental compilation for faster rebuilds
incremental = true

# Use all cores
jobs = 8

# Uncomment for faster local builds on Windows (requires rust-lld in PATH):
# [target.x86_64-pc-windows-msvc]
# linker = "rust-lld.exe"
# rustflags = ["-C", "linker-flavor=lld-link"]

[profile.dev]
# Minimal optimization for fast compile
opt-level = 0
# Skip debug info for faster compile (comment out if you need debugging)
debug = 0
# Split debuginfo for faster linking
split-debuginfo = "unpacked"

[profile.dev.package."*"]
# Optimize dependencies even in dev mode (they don't change often)
opt-level = 2
