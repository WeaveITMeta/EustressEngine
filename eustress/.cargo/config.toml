[build]
# Enable incremental compilation for faster rebuilds
incremental = true

# Use all cores
jobs = 8

[target.x86_64-pc-windows-msvc]
# rust-lld bundled with rustup — 2-4x faster than link.exe
# Full absolute path so cargo finds it without PATH changes
# linker-flavor=lld-link tells rustc to pass MSVC-style arguments to rust-lld
linker = "C:\\Users\\miksu\\.rustup\\toolchains\\stable-x86_64-pc-windows-msvc\\lib\\rustlib\\x86_64-pc-windows-msvc\\bin\\rust-lld.exe"
rustflags = ["-C", "linker-flavor=lld-link"]

[profile.dev]
# Minimal optimization for fast compile
opt-level = 0
# Skip debug info for faster compile (comment out if you need debugging)
debug = 0
# Split debuginfo for faster linking
split-debuginfo = "unpacked"

[profile.dev.package."*"]
# Optimize dependencies even in dev mode (they don't change often)
opt-level = 2
